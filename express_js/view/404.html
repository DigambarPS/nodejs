<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 Not Found</title>
  <style>
    body {
      background-color: #f4f4f9;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
    }
    h1 {
      font-size: 6em;
      color: #ff6b6b;
      margin: 0;
    }
    h2 {
      font-size: 2em;
      color: #333;
      margin: 10px 0;
    }
    p {
      color: #666;
      margin: 20px 0;
    }
    a {
      display: inline-block;
      padding: 10px 20px;
      background-color: #4a90e2;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }
    a:hover {
      background-color: #357ab8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Sorry, the page you are looking for doesn’t exist.</p>
    <a href="/">Go Back Home</a>
  </div>
</body>
</html>
